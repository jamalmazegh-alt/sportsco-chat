name: PR checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check server function guards
        run: bun run check:guards
      - name: Check i18n parity
        run: bun run check:i18n
      - name: Typecheck (non-blocking until router search params are cleaned up)
        continue-on-error: true
        run: bun run typecheck
      - name: Unit tests
        run: bun run test
      - name: Production build
        run: bun run build
