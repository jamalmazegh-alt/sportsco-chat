name: E2E Tests (Playwright)

on:
  schedule:
    - cron: "0 4 * * *" # 4 AM UTC, after RLS tests at 3 AM
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running these tests manually?"
        required: false
        default: "Manual run"

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start app (bughunt Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Optional: when set, the live AI assistant test (14) can actually run.
          # When absent the test skips cleanly instead of hard-failing.
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: |
          bun run dev -- --host 127.0.0.1 --port 8080 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/ >/dev/null; then
              echo "App ready on http://127.0.0.1:8080"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start within 120s"
          exit 1

      - name: Run E2E tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_BASE_URL: http://127.0.0.1:8080
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
          E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
          E2E_REAL_AI: ${{ github.event_name == 'schedule' && '1' || '0' }}
          # Exposed so the runner can detect the key and skip test 14 cleanly
          # when it's absent (a live-AI test must not hard-fail without a key).
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Create issue on cron failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 E2E tests failed — ${new Date().toISOString().slice(0, 10)}`,
              labels: ['e2e', 'bug'],
              body: `Nightly E2E test run failed.\n\n**Run:** ${runUrl}\n\nCheck the artifacts for the Playwright HTML report.`,
            });
