name: E2E Tests (Playwright)

on:
  schedule:
    - cron: "0 4 * * *" # 4 AM UTC, after RLS tests at 3 AM
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running these tests manually?"
        required: false
        default: "Manual run"

concurrency:
  group: e2e-tests
  cancel-in-progress: false

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_REAL_AI: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Create issue on cron failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 E2E tests failed — ${new Date().toISOString().slice(0, 10)}`,
              labels: ['e2e', 'bug'],
              body: `Nightly E2E test run failed.\n\n**Run:** ${runUrl}\n\nCheck the artifacts for the Playwright HTML report.`,
            });
